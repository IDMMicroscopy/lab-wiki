site_name: Lab Wiki
site_description: SOPs, equipment guides, training materials, and policies
site_url: https://idmmicroscopy.github.io/lab-wiki/

theme:
  name: material
  logo: assets/logo-placeholder.svg   # placeholder — swap for the real facility logo when available
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: Roboto Mono
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css   # brand color overrides (exact teal #00d2aa) + logo/table polish

hooks:
  - hooks/sop_versioning.py   # auto version + last-updated banner on every SOP page, from git history

# Lets readers jump straight to "Edit this page" on GitHub (optional, remove if you don't want this)
# edit_uri: edit/main/docs/

nav:
  - Home: index.md
  - Editing & Publishing Guide: editing-guide.md
  - SOPs:
      - Overview: sops/index.md
      - Sample Focusing SOP: sops/Sample-focusing-sop.md
  - Equipment:
      - Overview: equipment/index.md
  - Training:
      - Overview: training/index.md
  - Policies:
      - Overview: policies/index.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

plugins:
  - search

