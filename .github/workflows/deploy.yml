- name: Deploy GitHub wiki
  # You may pin to the exact commit or the version.
  # uses: actions4gh/deploy-wiki@5aca866154473e3c9e857f985329521599b8786f
  uses: actions4gh/deploy-wiki@v1.1.1
  with:
    # The base URL for the GitHub instance that you are trying to clone from, will use environment defaults to fetch from the same instance that the workflow is running from unless specified. Example URLs are https://github.com or https://my-ghes-server.example.com. The default is github.server_url. It's unlikely you need to change this unless you are deploying across a GHES boundary.
    github-server-url: # optional, default is ${{ github.server_url }}
    # The repository slug to use as the base project target of the wiki. The contents will be deployed to this repository's wiki tab, not the repository itself. Use this if you are pushing contents across the repository boundary. Defaults to the current repository from github.repository.
    repository: # optional, default is ${{ github.repository }}
    # Set this if you are pushing to a different repository. This token will need write permissions. The default is github.token.
    token: # optional, default is ${{ github.token }}
    # Path of the directory containing the wiki files to be deployed. Defaults to the wiki/ folder.
    path: # optional, default is wiki
